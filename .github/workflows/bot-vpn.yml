name: Minecraft Bot with VPN

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn
          npm install mineflayer
          echo "✅ Ready"

      - name: Run Bot with VPN
        run: |
          # تشغيل VPN في الخلفية
          sudo openvpn --config vpn.ovpn --daemon --log vpn.log &
          
          # انتظر 10 ثواني
          echo "⏳ Waiting for VPN..."
          sleep 10
          
          # تشغيل البوت
          echo "🚀 Starting bot..."
          node bot.js
        timeout-minutes: 360

      - name: Cleanup
        if: always()
        run: sudo killall openvpn || true
