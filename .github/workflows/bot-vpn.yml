name: Minecraft Bot with VPN

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ==================== تثبيت OpenVPN ====================
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl
          echo "✅ OpenVPN installed"

      # ==================== تجهيز ملف VPN ====================
      - name: Setup VPN config
        run: |
          # نسخ ملف VPN من الريبو
          if [ -f "vpn.ovpn" ]; then
            cp vpn.ovpn vpn.ovpn
            echo "✅ VPN config found"
          else
            echo "❌ VPN config not found!"
            exit 1
          fi

      # ==================== تشغيل VPN ====================
      - name: Start VPN
        run: |
          echo "🔄 Starting VPN..."
          
          # تشغيل VPN في الخلفية
          sudo openvpn --config vpn.ovpn --daemon --log vpn.log --writepid vpn.pid
          
          # انتظر 10 ثواني بالضبط
          echo "⏳ Waiting exactly 10 seconds for VPN to connect..."
          sleep 10
          
          # فحص الاتصال
          echo "🔍 Checking VPN connection..."
          
          # جرب تشوف IP
          VPN_IP=$(curl -s --max-time 5 https://api.ipify.org || echo "failed")
          
          if [ "$VPN_IP" != "failed" ]; then
            echo "✅ VPN CONNECTED SUCCESSFULLY!"
            echo "📡 Current IP: $VPN_IP"
            echo "✅ STEP COMPLETE - Moving to next step..."
          else
            echo "⚠️ VPN might not be ready, but continuing anyway..."
            echo "📡 Will try to connect without VPN check"
          fi
          
          # نخرج بنجاح عشان نكمل للخطوة اللي بعدها
          exit 0

      # ==================== تثبيت dependencies ====================
      - name: Install Bot Dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm install mineflayer
          echo "✅ Dependencies installed"

      # ==================== تشغيل البوت ====================
      - name: Run Minecraft Bot
        run: |
          echo "🚀 STARTING BOT..."
          echo "Current time: $(date)"
          echo "Current IP: $(curl -s https://api.ipify.org)"
          echo "================================"
          node bot.js
        timeout-minutes: 360

      # ==================== تنظيف ====================
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          sudo killall openvpn 2>/dev/null || true
          echo "✅ Done"
