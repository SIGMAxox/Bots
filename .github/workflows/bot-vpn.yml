name: Minecraft Bot with VPN

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # ==================== VPN SETUP ====================
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn
          echo "✅ OpenVPN installed"

      - name: Setup VPN config
        env:
          VPN_CONFIG: ${{ secrets.VPN_CONFIG }}
          VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
        run: |
          # Create VPN config file from secret
          echo "$VPN_CONFIG" > vpn.ovpn
          
          # Create auth file if username/password provided
          if [ ! -z "$VPN_USERNAME" ] && [ ! -z "$VPN_PASSWORD" ]; then
            echo "$VPN_USERNAME" > vpn-auth.txt
            echo "$VPN_PASSWORD" >> vpn-auth.txt
            echo "auth-user-pass vpn-auth.txt" >> vpn.ovpn
          fi
          
          echo "✅ VPN config ready"

      - name: Connect to VPN
        run: |
          # Start OpenVPN in background
          sudo openvpn --config vpn.ovpn --daemon
          
          echo "⏳ Waiting for VPN connection..."
          sleep 15
          
          # Check connection
          if ip addr show tun0 &> /dev/null; then
            echo "✅ VPN connected!"
            echo "📡 VPN IP:"
            curl -s https://api.ipify.org
            echo ""
          else
            echo "❌ VPN connection failed!"
            exit 1
          fi

      # ==================== BOT SETUP ====================
      - name: Install dependencies
        run: npm install

      - name: Run Bot
        run: |
          echo "🚀 Starting bot through VPN..."
          node bot-simple.js
        timeout-minutes: 360

      - name: Cleanup
        if: always()
        run: |
          sudo killall openvpn || true
          echo "✅ Cleaned up"
