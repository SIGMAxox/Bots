name: Minecraft Bot - kevin911 (Stealth Mode)

on:
  workflow_dispatch: # Manual trigger
  
  # Optional: Uncomment to run on schedule
  # schedule:
  #   - cron: '0 */12 * * *' # Every 12 hours

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Timeout after 6 hours
    timeout-minutes: 360
    
    # Use different runners randomly to avoid pattern detection
    strategy:
      fail-fast: false
      matrix:
        # Randomize runner selection
        runner: [ubuntu-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # ==================== IP & LOCATION SPOOFING ====================
      
      - name: Randomize system identity
        run: |
          echo "🕵️ Setting up stealth environment..."
          
          # Generate random hostname
          sudo hostnamectl set-hostname "user-$(shuf -i 1000-9999 -n 1)-$(shuf -i 1-999 -n 1)"
          
          # Random timezone to look like different locations
          TIMEZONES=("America/New_York" "America/Los_Angeles" "Europe/London" "Europe/Berlin" "Asia/Tokyo" "Australia/Sydney" "America/Sao_Paulo")
          RANDOM_TZ=${TIMEZONES[$RANDOM % ${#TIMEZONES[@]}]}
          sudo timedatectl set-timezone $RANDOM_TZ
          echo "Timezone set to: $(date +%Z)"
          
          # Random system language
          export LANG="en_US.UTF-8"
          echo "System language: $LANG"
          
      - name: Configure network optimizations
        run: |
          echo "🌐 Optimizing network settings for stable ping..."
          
          # TCP optimizations for better ping
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr > /dev/null 2>&1 || true
          sudo sysctl -w net.core.default_qdisc=fq > /dev/null 2>&1 || true
          sudo sysctl -w net.ipv4.tcp_slow_start_after_idle=0 > /dev/null 2>&1 || true
          sudo sysctl -w net.ipv4.tcp_notsent_lowat=16384 > /dev/null 2>&1 || true
          
          # Disable IPv6 to force IPv4 (more stable)
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1 > /dev/null 2>&1 || true
          
          echo "✅ Network optimizations applied"
      
      - name: Setup proxy/VPN (Optional - if you have proxy)
        run: |
          echo "🔒 Proxy configuration (if available)"
          # Note: GitHub Actions doesn't support external proxies by default
          # You would need to add proxy credentials as secrets
          
          # Example proxy setup (uncomment and add secrets if you have a proxy):
          # if [ -n "${{ secrets.PROXY_URL }}" ]; then
          #   export HTTP_PROXY="${{ secrets.PROXY_URL }}"
          #   export HTTPS_PROXY="${{ secrets.PROXY_URL }}"
          #   echo "✅ Proxy configured"
          # else
          #   echo "⚠️ No proxy configured - using GitHub's native IP"
          # fi
          
          echo "⚠️ Note: GitHub Actions use GitHub's IP ranges"
          echo "   To hide IP, consider using external VPS instead"
      
      # ==================== PING OPTIMIZATION ====================
      
      - name: Test and optimize ping
        run: |
          echo "📡 Testing connection to Ultimis.net..."
          
          # Measure initial ping
          PING_RESULT=$(ping -c 4 Ultimis.net 2>/dev/null | tail -1 | awk '{print $4}' | cut -d '/' -f 2)
          if [ -n "$PING_RESULT" ]; then
            echo "   Average ping: ${PING_RESULT}ms"
          else
            echo "   ⚠️ Could not measure ping"
          fi
          
          # Find best DNS servers
          echo "   Optimizing DNS..."
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf > /dev/null
          echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf > /dev/null
          
          echo "✅ Network testing complete"
      
      # ==================== DEPENDENCIES ====================
      
      - name: Setup Node.js with optimizations
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies with optimizations
        run: |
          echo "📦 Installing dependencies with optimizations..."
          
          # Install with specific flags for stability
          npm install --no-fund --no-audit --prefer-offline
          
          # Install additional packages for better performance
          npm install mineflayer minecraft-protocol
          
          echo "✅ Dependencies installed"
          
      - name: Create optimized bot configuration
        run: |
          cat > bot-config.json << 'EOF'
          {
            "network": {
              "enableLatencyOptimization": true,
              "preferIPv4": true,
              "tcpKeepAlive": true,
              "tcpNoDelay": true
            },
            "ping": {
              "simulateRealisticPing": true,
              "basePing": 40,
              "pingVariation": 15,
              "jitterAmount": 5
            },
            "stealth": {
              "randomizePackets": true,
              "humanizeDelays": true,
              "spoofClientBrand": true
            }
          }
          EOF
          echo "✅ Bot configuration created"
      
      # ==================== RUN BOT ====================
      
      - name: Run Minecraft Bot with stealth
        run: |
          echo "🚀 Starting Minecraft Bot in stealth mode..."
          echo "Current time: $(date)"
          echo "Current timezone: $(date +%Z)"
          echo "================================"
          
          # Add random startup delay to avoid pattern
          DELAY=$((RANDOM % 5 + 2))
          echo "⏱️  Starting in ${DELAY} seconds..."
          sleep $DELAY
          
          # Run bot with additional environment variables
          NODE_OPTIONS="--max-old-space-size=512" \
          BOT_START_TIME=$(date +%s) \
          RANDOM_SEED=$RANDOM \
          node bot.js 2>&1 | tee bot-output.log
          
        continue-on-error: true
        env:
          # Randomize bot behavior
          BOT_MODE: "stealth"
          HUMAN_TYPING_SPEED: "true"
          RANDOM_DELAYS: "true"
      
      # ==================== MONITORING ====================
      
      - name: Monitor bot performance
        if: always()
        run: |
          echo "📊 Bot performance metrics:"
          echo "================================"
          
          # Check if bot is still running
          if pgrep -f "node bot.js" > /dev/null; then
            echo "✅ Bot is running"
          else
            echo "⚠️ Bot has stopped"
          fi
          
          # Network stats
          echo ""
          echo "🌐 Network statistics:"
          netstat -an | grep -E "25565|ESTABLISHED" | head -5 || echo "   No active connections"
          
          # System load
          echo ""
          echo "💻 System load:"
          uptime
          
          # Memory usage
          echo ""
          echo "🧠 Memory usage:"
          free -h
      
      - name: Generate stealth report
        if: always()
        run: |
          echo "🕵️ Stealth Report"
          echo "================================"
          echo "Bot started at: $(date -d @${BOT_START_TIME:-0} 2>/dev/null || echo "Unknown")"
          echo "GitHub Runner IP: $(curl -s ifconfig.me || echo "Unknown")"
          echo "Timezone: $(date +%Z)"
          echo "================================"
          
          # Check for detection patterns
          if [ -f bot-output.log ]; then
            echo ""
            echo "📋 Detection analysis:"
            if grep -qi "antibot\|antibot\|detected\|flagged\|suspicious" bot-output.log; then
              echo "⚠️ WARNING: Possible detection patterns found"
              grep -i "antibot\|detected\|flagged" bot-output.log | head -5
            else
              echo "✅ No obvious detection patterns"
            fi
          fi
      
      # ==================== ARTIFACTS ====================
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stealth-bot-logs
          path: |
            *.log
            bot-output.log
            logs/
          if-no-files-found: ignore
          retention-days: 3
      
      - name: Upload network diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-diagnostics
          path: |
            /tmp/*.pcap
            network-*.log
          if-no-files-found: ignore
          retention-days: 1
      
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          # Kill any remaining node processes
          pkill -f "node bot.js" || true
          
          # Clear sensitive data
          rm -f bot-output.log 2>/dev/null || true
          
          echo "✅ Cleanup complete"
