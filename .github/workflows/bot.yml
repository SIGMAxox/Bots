name: Minecraft Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install mineflayer@4.14.0
          npm install socks-proxy-agent@8.0.2
          echo ""
          echo "✅ Installed:"
          npm list --depth=0
      
      - name: Run bot
        run: node bot.js
