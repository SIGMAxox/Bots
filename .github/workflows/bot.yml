name: Minecraft Bot - kevin911 (Advanced)

on:
  workflow_dispatch: # Manual trigger
  
  # Optional: Uncomment to run on schedule
  # schedule:
  #   - cron: '0 */12 * * *' # Every 12 hours

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Timeout after 6 hours
    timeout-minutes: 360
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          if [ ! -d "node_modules" ]; then
            npm install
            echo "✅ Dependencies installed"
          else
            echo "✅ Dependencies restored from cache"
          fi
      
      - name: Display bot info
        run: |
          echo "🤖 Minecraft Bot Configuration"
          echo "================================"
          echo "Bot Username: kevin911"
          echo "Server: Ultimis.net"
          echo "Version: 1.12.2"
          echo "Trigger Player: SIGMAxox"
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "================================"
          echo ""
      
      - name: Verify dependencies
        run: |
          echo "🔍 Verifying mineflayer installation..."
          npm list mineflayer || echo "⚠️ Mineflayer not found, will install..."
      
      - name: Run Minecraft Bot
        run: |
          echo "🚀 Starting Minecraft Bot..."
          echo "Current time: $(date)"
          node bot.js
        continue-on-error: true
      
      - name: Bot finished
        if: always()
        run: |
          echo "🏁 Bot execution completed"
          echo "Finished at: $(date)"
          echo ""
          echo "📊 Summary:"
          echo "  - Check logs above for details"
          echo "  - If bot failed, check for:"
          echo "    * VPN/Proxy detection"
          echo "    * Rate limiting"
          echo "    * Authentication issues"
          echo "    * Network connectivity"
      
      - name: Upload logs (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: |
            *.log
            logs/
          if-no-files-found: ignore
