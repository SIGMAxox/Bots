name: Minecraft Bot - kevin911

on:
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - main
  schedule:
    # Run every 6 hours (optional - remove if not needed)
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Minecraft Bot
        run: |
          echo "Starting Minecraft Bot..."
          node bot.js
        timeout-minutes: 360 # Bot will run for 6 hours max

      - name: Bot finished
        if: always()
        run: echo "Bot execution completed or timed out"
