name: Minecraft Bot - Stealth Mode with Proxy

on:
  workflow_dispatch: # Manual trigger only (no schedule to avoid detection)
    inputs:
      use_proxy:
        description: 'Use proxy?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Timeout after 2 hours
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # ==================== SETUP NODE ====================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      # ==================== CACHE DEPENDENCIES ====================
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            ${{ runner.os }}-
      
      # ==================== INSTALL DEPENDENCIES ====================
      - name: Install dependencies
        run: |
          echo "📦 Installing required packages..."
          
          # Create package.json if it doesn't exist
          if [ ! -f package.json ]; then
            echo '{
              "name": "minecraft-bot",
              "version": "1.0.0",
              "dependencies": {
                "mineflayer": "^4.14.0",
                "socks-proxy-agent": "^8.0.2"
              }
            }' > package.json
          fi
          
          # Install dependencies
          npm install
          
          echo "✅ Dependencies installed:"
          npm list --depth=0
      
      # ==================== VERIFY INSTALLATION ====================
      - name: Verify dependencies
        run: |
          echo "🔍 Verifying installations..."
          
          # Check if mineflayer is installed
          if node -e "require('mineflayer')" 2>/dev/null; then
            echo "✅ mineflayer installed"
          else
            echo "❌ mineflayer missing, installing..."
            npm install mineflayer@latest
          fi
          
          # Check if socks-proxy-agent is installed
          if node -e "require('socks-proxy-agent')" 2>/dev/null; then
            echo "✅ socks-proxy-agent installed"
          else
            echo "❌ socks-proxy-agent missing, installing..."
            npm install socks-proxy-agent@latest
          fi
          
          echo "✅ All dependencies verified"
      
      # ==================== CREATE BOT FILE ====================
      - name: Create bot file
        run: |
          cat > bot.js << 'EOF'
          const mineflayer = require('mineflayer');
          const { SocksProxyAgent } = require('socks-proxy-agent');
          
          // ==================== PROXY CONFIGURATION ====================
          const USE_PROXY = process.env.USE_PROXY === 'true';
          
          let agent = null;
          
          if (USE_PROXY) {
              const PROXY_HOST = process.env.PROXY_HOST;
              const PROXY_PORT = process.env.PROXY_PORT;
              const PROXY_USER = process.env.PROXY_USER;
              const PROXY_PASS = process.env.PROXY_PASS;
              
              if (PROXY_HOST && PROXY_PORT) {
                  try {
                      let proxyUrl;
                      if (PROXY_USER && PROXY_PASS) {
                          proxyUrl = `socks5://${PROXY_USER}:${PROXY_PASS}@${PROXY_HOST}:${PROXY_PORT}`;
                      } else {
                          proxyUrl = `socks5://${PROXY_HOST}:${PROXY_PORT}`;
                      }
                      agent = new SocksProxyAgent(proxyUrl);
                      console.log('✅ Proxy configured:', `${PROXY_HOST}:${PROXY_PORT}`);
                  } catch (err) {
                      console.log('⚠️ Proxy error:', err.message);
                  }
              } else {
                  console.log('⚠️ Proxy enabled but no proxy details found in secrets');
              }
          } else {
              console.log('ℹ️ Proxy disabled, using direct connection');
          }
          
          // ==================== BOT CONFIG ====================
          const BOT_CONFIG = {
              host: 'Ultimis.net',
              port: 25565,
              username: 'kevin911',
              version: '1.12.2',
              auth: 'offline'
          };
          
          if (agent) {
              BOT_CONFIG.agent = agent;
          }
          
          console.log('🚀 Starting Minecraft Bot...');
          console.log('📡 Server:', BOT_CONFIG.host);
          console.log('🤖 Bot:', BOT_CONFIG.username);
          console.log('🔌 Connection:', agent ? 'Via Proxy' : 'Direct');
          
          const bot = mineflayer.createBot(BOT_CONFIG);
          
          let loginSent = false;
          let startTime = Date.now();
          
          // ==================== EVENTS ====================
          
          bot.on('login', () => {
              console.log('✅ Connected to server');
          });
          
          bot.on('spawn', () => {
              console.log('✅ Spawned in world');
              
              if (!loginSent) {
                  loginSent = true;
                  setTimeout(() => {
                      console.log('🔑 Sending login...');
                      bot.chat('/login asdfghjkl1');
                  }, 2000);
              }
          });
          
          bot.on('message', (msg) => {
              const text = msg.toString();
              console.log('💬', text);
              
              const lowerText = text.toLowerCase();
              
              if (lowerText.includes('register') && lowerText.includes('password')) {
                  console.log('📝 Registering...');
                  bot.chat('/register asdfghjkl1 asdfghjkl1');
              }
              
              if (lowerText.includes('login') && lowerText.includes('password')) {
                  console.log('🔑 Logging in...');
                  bot.chat('/login asdfghjkl1');
              }
              
              if (lowerText.includes('successfully logged in')) {
                  console.log('✅ Login successful! Bot is running.');
                  console.log(`⏱️  Uptime: ${Math.floor((Date.now() - startTime) / 1000)} seconds`);
              }
              
              if (lowerText.includes('vpn') || lowerText.includes('proxy')) {
                  console.log('⚠️ Server detected proxy! This proxy may be blocked.');
              }
          });
          
          bot.on('kicked', (reason) => {
              const reasonText = typeof reason === 'string' ? reason : JSON.stringify(reason);
              console.log('❌ Kicked:', reasonText);
              
              if (reasonText.includes('VPN') || reasonText.includes('proxy')) {
                  console.log('💡 Proxy detected. Try a different proxy from your list.');
              }
              
              process.exit(1);
          });
          
          bot.on('error', (err) => {
              console.log('⚠️ Error:', err.message);
          });
          
          bot.on('end', () => {
              console.log('🔌 Connection ended');
              process.exit(0);
          });
          
          // Keep bot alive
          setInterval(() => {
              if (bot && bot.entity) {
                  const uptime = Math.floor((Date.now() - startTime) / 1000);
                  if (uptime % 60 === 0 && uptime > 0) {
                      console.log(`💚 Bot alive for ${Math.floor(uptime / 60)} minutes`);
                  }
              }
          }, 60000);
          EOF
          
          echo "✅ bot.js created"
      
      # ==================== TEST PROXY (Optional) ====================
      - name: Test proxy connection
        if: github.event.inputs.use_proxy == 'true'
        run: |
          echo "🧪 Testing proxy connection..."
          
          node -e "
          const { SocksProxyAgent } = require('socks-proxy-agent');
          const https = require('https');
          
          const proxyUrl = 'socks5://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:${{ secrets.PROXY_PORT }}';
          const agent = new SocksProxyAgent(proxyUrl);
          
          const options = {
              hostname: 'api.ipify.org',
              port: 443,
              path: '/',
              method: 'GET',
              agent: agent,
              timeout: 10000
          };
          
          const req = https.request(options, (res) => {
              let data = '';
              res.on('data', (chunk) => { data += chunk; });
              res.on('end', () => {
                  console.log('✅ Proxy working! IP:', data);
              });
          });
          
          req.on('error', (err) => {
              console.log('❌ Proxy test failed:', err.message);
              process.exit(1);
          });
          
          req.end();
          "
      
      # ==================== RUN BOT ====================
      - name: Run Minecraft Bot
        run: |
          echo "🚀 Starting bot..."
          echo "Current time: $(date)"
          echo "================================="
          
          node bot.js
        env:
          USE_PROXY: ${{ github.event.inputs.use_proxy }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        continue-on-error: false
      
      # ==================== STATUS REPORT ====================
      - name: Bot status
        if: always()
        run: |
          echo ""
          echo "================================="
          echo "🏁 Bot execution completed"
          echo "Finished at: $(date)"
          echo "================================="
          
          # Check exit code
          if [ $? -eq 0 ]; then
            echo "✅ Bot ran successfully"
          else
            echo "❌ Bot encountered an error"
          fi
      
      # ==================== UPLOAD LOGS ====================
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-error-logs
          path: |
            *.log
          retention-days: 3
